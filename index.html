<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mosaic</title>
  <style>
    * { margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }
    .controls {
      position: fixed;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      align-items: end;
      gap: 72px;
      opacity: 0.6;
      pointer-events: none;
      z-index: 10;
    }
    .controls img { image-rendering: pixelated; transition: filter 0.05s; }
    .controls img.pressed { filter: brightness(1.8) sepia(1) saturate(3) hue-rotate(-10deg); }
    .control-group {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
    }
    .control-keys {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
    }
    .control-row {
      display: flex;
      gap: 2px;
    }
    @font-face {
      font-family: 'NinjaFont';
      src: url('ui/NormalFont.ttf');
    }
    .control-label {
      color: #888;
      font-family: 'NinjaFont', monospace;
      font-size: 16px;
      text-align: center;
    }
    @media (min-width: 640px) {
      .control-group {
        flex-direction: row;
        align-items: center;
        gap: 12px;
      }
      .control-group.move-group {
        flex-direction: row-reverse;
      }
    }
    @media (max-width: 639px) {
      .control-label {
        margin-top: 4px;
      }
    }
  </style>
</head>
<body>
  <div class="controls">
    <div class="control-group move-group">
      <div class="control-keys">
        <img id="key-up" src="ui/keys/KeyUp.png" width="39" height="39" alt="Up" />
        <div class="control-row">
          <img id="key-left" src="ui/keys/KeyLeft.png" width="39" height="39" alt="Left" />
          <img id="key-down" src="ui/keys/KeyDown.png" width="39" height="39" alt="Down" />
          <img id="key-right" src="ui/keys/KeyRight.png" width="39" height="39" alt="Right" />
        </div>
      </div>
      <div class="control-label">Move</div>
    </div>
    <div class="control-group">
      <img id="key-space" src="ui/keys/KeySpace.png" width="99" height="39" alt="Space" />
      <div class="control-label">Interact</div>
    </div>
  </div>
  <script>
    const keyMap = {
      ArrowUp: 'key-up', ArrowDown: 'key-down', ArrowLeft: 'key-left', ArrowRight: 'key-right',
      w: 'key-up', s: 'key-down', a: 'key-left', d: 'key-right',
      ' ': 'key-space', Enter: 'key-space', e: 'key-space'
    };
    window.addEventListener('keydown', e => {
      const id = keyMap[e.key];
      if (id) document.getElementById(id)?.classList.add('pressed');
    });
    window.addEventListener('keyup', e => {
      const id = keyMap[e.key];
      if (id) document.getElementById(id)?.classList.remove('pressed');
    });
  </script>
  <script type="module" src="/src/game/main.ts"></script>
</body>
</html>
