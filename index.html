<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mosaic</title>
  <style>
    * { margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }
    #loading-screen {
      position: fixed; inset: 0; z-index: 100;
      background: #000;
      display: flex; align-items: center; justify-content: center;
      transition: opacity 0.8s;
    }
    #loading-screen.fade-out { opacity: 0; pointer-events: none; }
    #loading-text {
      font-family: 'NinjaFont', monospace;
      font-size: 24px;
      color: #555;
    }
    .controls {
      position: fixed;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      align-items: end;
      gap: 72px;
      opacity: 0.6;
      pointer-events: auto;
      user-select: none;
      -webkit-user-select: none;
      z-index: 10;
    }
    .controls img { image-rendering: pixelated; transition: filter 0.05s; }
    .controls img.pressed { filter: brightness(1.8) sepia(1) saturate(3) hue-rotate(-10deg); }
    .control-group {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
    }
    .control-keys {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
    }
    .control-row {
      display: flex;
      gap: 2px;
    }
    @font-face {
      font-family: 'NinjaFont';
      src: url('ui/NormalFont.ttf');
    }
    .control-label {
      color: #888;
      font-family: 'NinjaFont', monospace;
      font-size: 28px;
      text-align: center;
    }
    @media (min-width: 640px) {
      .control-group {
        flex-direction: row;
        align-items: center;
        gap: 12px;
      }
      .control-group.move-group {
        flex-direction: row-reverse;
      }
    }
    @media (max-width: 639px) {
      .control-label {
        margin-top: 4px;
      }
    }
  </style>
</head>
<body>
  <div id="loading-screen"><span id="loading-text">Loading...</span></div>
  <div class="controls">
    <div class="control-group move-group">
      <div class="control-keys">
        <img id="key-up" src="ui/keys/KeyUp.png" width="39" height="39" alt="Up" />
        <div class="control-row">
          <img id="key-left" src="ui/keys/KeyLeft.png" width="39" height="39" alt="Left" />
          <img id="key-down" src="ui/keys/KeyDown.png" width="39" height="39" alt="Down" />
          <img id="key-right" src="ui/keys/KeyRight.png" width="39" height="39" alt="Right" />
        </div>
      </div>
      <div class="control-label">Move</div>
    </div>
    <div class="control-group">
      <img id="key-space" src="ui/keys/KeySpace.png" width="99" height="39" alt="Space" />
      <div class="control-label">Interact</div>
    </div>
  </div>
  <script>
    const keyMap = {
      ArrowUp: 'key-up', ArrowDown: 'key-down', ArrowLeft: 'key-left', ArrowRight: 'key-right',
      w: 'key-up', s: 'key-down', a: 'key-left', d: 'key-right',
      ' ': 'key-space', Enter: 'key-space', e: 'key-space'
    };
    window.addEventListener('keydown', e => {
      const id = keyMap[e.key];
      if (id) document.getElementById(id)?.classList.add('pressed');
    });
    window.addEventListener('keyup', e => {
      const id = keyMap[e.key];
      if (id) document.getElementById(id)?.classList.remove('pressed');
    });

    // Touch controls: map button touches to keyboard events
    const touchMap = {
      'key-up': 'ArrowUp', 'key-down': 'ArrowDown',
      'key-left': 'ArrowLeft', 'key-right': 'ArrowRight',
      'key-space': ' '
    };
    const activeKeys = new Set();

    function sendKey(key, type) {
      window.dispatchEvent(new KeyboardEvent(type, { key, bubbles: true }));
    }

    for (const [id, key] of Object.entries(touchMap)) {
      const el = document.getElementById(id);
      if (!el) continue;

      el.addEventListener('touchstart', e => {
        e.preventDefault();
        el.classList.add('pressed');
        activeKeys.add(key);
        sendKey(key, 'keydown');
      }, { passive: false });

      el.addEventListener('touchend', e => {
        e.preventDefault();
        el.classList.remove('pressed');
        activeKeys.delete(key);
        sendKey(key, 'keyup');
      }, { passive: false });

      el.addEventListener('touchcancel', e => {
        e.preventDefault();
        el.classList.remove('pressed');
        activeKeys.delete(key);
        sendKey(key, 'keyup');
      }, { passive: false });
    }

    // Handle touch leaving one button and entering another (drag between keys)
    document.querySelector('.controls')?.addEventListener('touchmove', e => {
      e.preventDefault();
      for (const touch of e.changedTouches) {
        const el = document.elementFromPoint(touch.clientX, touch.clientY);
        const img = el?.closest('img[id]');
        // Release keys not under finger
        for (const [id, key] of Object.entries(touchMap)) {
          const btn = document.getElementById(id);
          if (btn !== img && activeKeys.has(key)) {
            btn?.classList.remove('pressed');
            activeKeys.delete(key);
            sendKey(key, 'keyup');
          }
        }
        // Press key under finger
        if (img?.id && touchMap[img.id] && !activeKeys.has(touchMap[img.id])) {
          img.classList.add('pressed');
          activeKeys.add(touchMap[img.id]);
          sendKey(touchMap[img.id], 'keydown');
        }
      }
    }, { passive: false });
  </script>
  <script type="module" src="/src/game/main.ts"></script>
</body>
</html>
