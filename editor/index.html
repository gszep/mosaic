<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mosaic — Map Editor</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Ubuntu+Mono:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <div id="workspace">
    <div id="canvas-wrap">
      <canvas id="map-canvas"></canvas>
      <div id="inspector-tooltip"></div>
    </div>

    <div id="bottom-panel">
      <div id="palette-panel">
        <div id="palette-header">
          <select id="tileset-select"></select>
          <div id="selected-tile-info"></div>
        </div>
        <div id="palette-scroll">
          <canvas id="palette-canvas"></canvas>
        </div>
      </div>

      <div id="side-panels">
        <div id="maps-panel">
          <h3>Maps</h3>
          <ul id="map-list"></ul>
        </div>
        <div id="layers-panel">
          <h3>Layers</h3>
          <ul id="layer-list"></ul>
        </div>
        <div id="tools-panel">
          <h3>Tools</h3>
          <ul id="tool-list">
            <li class="tool active" data-tool="paint">Paint</li>
            <li class="tool" data-tool="erase">Erase</li>
            <li class="tool" data-tool="inspect">Inspect</li>
          </ul>
        </div>
      </div>
    </div>
  </div>

  <script type="module" src="./main.ts"></script>
</body>
</html>
