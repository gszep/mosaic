<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mosaic — Map Editor</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Ubuntu+Mono:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <div id="toolbar">
    <button id="save-tmj">Save</button>
    <span class="sep"></span>
    <button id="tool-paint" class="tool active" data-tool="paint">Paint</button>
    <button id="tool-erase" class="tool" data-tool="erase">Erase</button>
    <button id="tool-inspect" class="tool" data-tool="inspect">Inspect</button>
    <span class="sep"></span>
    <span id="toggle-grid" class="check checked">[x] Grid</span>
    <span id="toggle-collision" class="check">[ ] Collision</span>
  </div>

  <div id="workspace">
    <div id="canvas-wrap">
      <canvas id="map-canvas"></canvas>
      <div id="inspector-tooltip"></div>
    </div>

    <div id="bottom-panel">
      <div id="palette-panel">
        <div id="palette-header">
          <select id="tileset-select"></select>
          <div id="selected-tile-info"></div>
        </div>
        <div id="palette-scroll">
          <canvas id="palette-canvas"></canvas>
        </div>
      </div>

      <div id="side-panels">
        <div id="maps-panel">
          <h3>Maps</h3>
          <ul id="map-list"></ul>
        </div>
        <div id="layers-panel">
          <h3>Layers</h3>
          <ul id="layer-list"></ul>
        </div>
      </div>
    </div>
  </div>

  <script type="module" src="./main.ts"></script>
</body>
</html>
